; ── ESP-AL Firmware ────────────────────────────────────────────────────────────
; Board: Freenove ESP32-S3-WROOM (FNK0085) — N8R8 (8MB Flash, 8MB OPI PSRAM)
; Flash via USB-C — no FTDI programmer needed.
;
; First time setup:
;   1. Install PlatformIO (VS Code extension or CLI)
;   2. Copy src/config.h.example to src/config.h and fill in your credentials
;   3. pio run --target upload
;   4. pio device monitor

[env:freenove_esp32s3_n8r8]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; N8R8: QIO flash + OPI PSRAM
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_upload.flash_size         = 8MB
board_build.partitions          = default_8MB.csv

; USB-C serial (built-in USB-to-serial on Freenove board)
monitor_speed    = 115200
monitor_filters  = esp32_exception_decoder

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1

lib_deps =
  bblanchon/ArduinoJson@^7.0.0
