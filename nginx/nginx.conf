# ── ESP-AL Nginx reverse proxy ────────────────────────────────────────────────
# Drop this in your Nginx config directory and reload.
# Adjust server_name and proxy_pass port to match your setup.

server {
    listen 80;
    server_name espal.local;        # change to your hostname or IP

    client_max_body_size 20M;       # allow large photo uploads

    location / {
        proxy_pass         http://127.0.0.1:3070;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow streaming of large video files
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }
}
